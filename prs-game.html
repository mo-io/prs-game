<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>PRS — Rock · Paper · Scissors</title>
<style>
/* ═══════════════════════════════════════════════════
   THEME — "Arcade Duel" (retheme everything from here)
   ═══════════════════════════════════════════════════ */
:root{
  --bg-0:#1a1340;
  --bg-1:#2a1a63;
  --bg-2:#120c2e;
  --accent:#7c5cff;
  --accent-2:#b78bff;
  --win:#3ddc84;
  --lose:#ff5470;
  --draw:#ffc145;
  --ink:#f4f1ff;
  --muted:#a99fd6;
  --card:#2c2058;
  --card-hi:#3a2c70;
  --line:rgba(183,139,255,.25);
  --shadow:0 18px 40px rgba(0,0,0,.45);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 800px at 50% -10%, var(--bg-1), transparent 60%),
    radial-gradient(900px 700px at 50% 120%, var(--accent) -40%, transparent 55%),
    linear-gradient(160deg, var(--bg-0), var(--bg-2));
  min-height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  user-select:none;
}

/* ── HUD ─────────────────────────────────────────── */
#hud{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:10px;
  padding:14px 18px;
  padding-top:max(14px, env(safe-area-inset-top));
  border-bottom:1px solid var(--line);
  background:rgba(18,12,46,.45);
  backdrop-filter:blur(6px);
}
.score-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
.score-cell.you{align-items:flex-start;}
.score-cell.cpu{align-items:flex-end;}
.score-label{font-size:12px;letter-spacing:.18em;color:var(--muted);font-weight:700;}
.score-num{font-size:34px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.you .score-num{color:var(--accent-2);text-shadow:0 0 18px rgba(124,92,255,.5);}
.cpu .score-num{color:var(--lose);text-shadow:0 0 18px rgba(255,84,112,.45);}
#center-badge{
  text-align:center;display:flex;flex-direction:column;gap:4px;align-items:center;min-width:120px;
}
#mode-badge{
  font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--accent-2);border:1px solid var(--line);border-radius:999px;
  padding:4px 12px;white-space:nowrap;background:rgba(124,92,255,.12);
}
#best-chip{font-size:12px;color:var(--muted);font-weight:700;}

/* ── ARENA ───────────────────────────────────────── */
#arena{
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:18px;
  position:relative;
}
#duel{
  display:flex;align-items:center;justify-content:center;gap:clamp(14px,5vw,48px);
  width:100%;max-width:720px;
}
.fighter{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;}
.fighter-name{font-size:13px;letter-spacing:.18em;font-weight:800;color:var(--muted);}
.fighter.you .fighter-name{color:var(--accent-2);}
.fighter.cpu .fighter-name{color:var(--lose);}
.glyph-card{
  width:clamp(110px,30vw,168px);height:clamp(110px,30vw,168px);
  border-radius:28px;
  background:linear-gradient(160deg,var(--card-hi),var(--card));
  border:1px solid var(--line);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(54px,15vw,92px);line-height:1;
  transition:transform .15s ease, box-shadow .25s ease, border-color .25s ease;
}
.fighter.cpu .glyph-card{transform:scaleX(-1);}            /* mirror so fists face each other */
.glyph-card.shake{animation:shake .25s ease-in-out infinite;}
.fighter.cpu .glyph-card.shake{animation:shake-cpu .25s ease-in-out infinite;}
.glyph-card.win{border-color:var(--win);box-shadow:0 0 0 3px rgba(61,220,132,.35),var(--shadow);}
.glyph-card.lose{border-color:var(--lose);box-shadow:0 0 0 3px rgba(255,84,112,.30),var(--shadow);opacity:.85;}
.glyph-card.pop{animation:pop .3s ease;}
@keyframes shake{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-14px) rotate(-6deg)}75%{transform:translateY(-4px) rotate(3deg)}}
@keyframes shake-cpu{0%,100%{transform:scaleX(-1) translateY(0) rotate(0)}25%{transform:scaleX(-1) translateY(-14px) rotate(-6deg)}75%{transform:scaleX(-1) translateY(-4px) rotate(3deg)}}
@keyframes pop{0%{transform:scale(.7)}55%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes pop-cpu{0%{transform:scaleX(-1) scale(.7)}55%{transform:scaleX(-1) scale(1.12)}100%{transform:scaleX(-1) scale(1)}}
.fighter.cpu .glyph-card.pop{animation:pop-cpu .3s ease;}
.vs{font-size:clamp(20px,6vw,34px);font-weight:900;color:var(--muted);opacity:.7;letter-spacing:.04em;}

#banner{
  min-height:46px;font-size:clamp(22px,6vw,32px);font-weight:900;letter-spacing:.02em;
  text-align:center;transition:color .2s, transform .2s;transform:scale(1);
}
#banner.show{animation:bannerin .3s ease;}
#banner.win{color:var(--win);text-shadow:0 0 22px rgba(61,220,132,.5);}
#banner.lose{color:var(--lose);text-shadow:0 0 22px rgba(255,84,112,.5);}
#banner.draw{color:var(--draw);text-shadow:0 0 22px rgba(255,193,69,.5);}
@keyframes bannerin{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* ── MOVE BUTTONS ────────────────────────────────── */
#controls{
  flex:0 0 auto;
  display:flex;justify-content:center;gap:clamp(10px,3vw,20px);
  padding:18px;padding-bottom:max(18px, env(safe-area-inset-bottom));
}
.move-btn{
  flex:1 1 0;max-width:170px;
  min-height:84px;border-radius:22px;cursor:pointer;
  background:linear-gradient(160deg,var(--card-hi),var(--card));
  border:1px solid var(--line);color:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.05em;
  box-shadow:var(--shadow);
  transition:transform .08s ease, border-color .15s ease, background .15s ease;
}
.move-btn .mv-glyph{font-size:38px;line-height:1;}
.move-btn .mv-key{font-size:11px;color:var(--muted);font-weight:700;}
.move-btn:hover{border-color:var(--accent);}
.move-btn:active{transform:translateY(2px) scale(.97);}
.move-btn.flash{border-color:var(--accent-2);background:linear-gradient(160deg,var(--accent),var(--card-hi));}
#controls.disabled{pointer-events:none;opacity:.5;}

/* ── GAME BUTTONS (Pause / Reset) ───────────────── */
#game-btns{
  flex:0 0 auto;
  display:flex;justify-content:center;gap:12px;
  padding:0 18px 10px;
}
#game-btns.hidden{display:none;}
.game-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 20px;border-radius:14px;cursor:pointer;
  background:rgba(44,32,88,.7);border:1px solid var(--line);color:var(--muted);
  font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.05em;
  transition:border-color .15s, color .15s, background .15s;
}
.game-btn:hover{border-color:var(--accent-2);color:var(--ink);}
.game-btn:active{transform:translateY(1px);}
.game-btn .gb-icon{font-size:15px;}
.game-btn .gb-key{font-size:11px;color:var(--muted);opacity:.7;margin-left:2px;}
#btn-reset:hover{border-color:var(--lose);color:var(--lose);}
@media (max-width:520px){
  .game-btn .gb-label{display:none;}
  .game-btn .gb-key{display:none;}
  .game-btn{padding:9px 14px;}
}

/* ── PAUSE OVERLAY ───────────────────────────────── */
#pause-overlay{
  position:fixed;inset:0;z-index:15;
  display:flex;align-items:center;justify-content:center;
  background:rgba(18,12,46,.72);
}
#pause-overlay.hidden{display:none;}
.pause-panel{
  text-align:center;padding:36px 40px;
  background:linear-gradient(160deg,rgba(58,44,112,.95),rgba(28,20,68,.97));
  border:1px solid var(--line);border-radius:24px;
  box-shadow:var(--shadow);min-width:240px;
}
#pause-title{
  font-size:28px;font-weight:900;letter-spacing:.14em;
  color:var(--accent-2);margin:0 0 28px;
}
.pause-action-btn{
  display:block;width:100%;padding:13px;border-radius:14px;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:800;letter-spacing:.04em;
  transition:transform .08s, opacity .12s;margin-bottom:10px;
}
.pause-action-btn:last-child{margin-bottom:0;}
#resume-btn{
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  border:none;color:#fff;
  box-shadow:0 8px 20px rgba(124,92,255,.35);
}
#reset-from-pause-btn{
  background:transparent;border:1px solid var(--line);color:var(--muted);
}
#reset-from-pause-btn:hover{border-color:var(--lose);color:var(--lose);}
.pause-action-btn:active{transform:translateY(1px);}

/* ── OVERLAY (start / game over) ─────────────────── */
#overlay{
  position:fixed;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(800px 600px at 50% 30%, rgba(42,26,99,.55), rgba(18,12,46,.92));
  backdrop-filter:blur(8px);
}
#overlay.hidden{display:none;}
.panel{
  width:min(460px,100%);
  background:linear-gradient(160deg,rgba(58,44,112,.92),rgba(28,20,68,.95));
  border:1px solid var(--line);border-radius:26px;
  box-shadow:var(--shadow);
  padding:30px 26px;text-align:center;
}
.title{
  font-size:clamp(40px,12vw,60px);font-weight:900;letter-spacing:.06em;margin:0 0 6px;
  background:linear-gradient(90deg,var(--accent-2),var(--win),var(--draw));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{color:var(--muted);font-size:15px;margin:0 0 18px;font-weight:600;letter-spacing:.04em;}
.instructions{font-size:14px;line-height:1.7;color:var(--ink);margin:0 0 22px;opacity:.92;}
.instructions span{color:var(--accent-2);font-weight:700;}
.go-stats{display:flex;justify-content:center;gap:26px;margin:6px 0 22px;}
.go-stat{display:flex;flex-direction:column;gap:2px;}
.go-stat .v{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;}
.go-stat.you .v{color:var(--accent-2);}
.go-stat.cpu .v{color:var(--lose);}
.go-stat .l{font-size:12px;letter-spacing:.14em;color:var(--muted);font-weight:700;}

.field-label{font-size:12px;letter-spacing:.16em;color:var(--muted);font-weight:800;margin:14px 0 8px;}
.seg{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;}
.seg-btn{
  min-width:64px;padding:10px 8px;border-radius:14px;cursor:pointer;
  background:rgba(124,92,255,.10);border:1px solid var(--line);color:var(--muted);
  font-family:inherit;font-weight:800;font-size:14px;transition:.15s;
}
.seg-btn.active{background:linear-gradient(160deg,var(--accent),var(--card-hi));color:#fff;border-color:var(--accent-2);}

.play-btn{
  margin-top:20px;width:100%;padding:16px;border-radius:16px;cursor:pointer;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  border:none;color:#fff;font-family:inherit;font-size:18px;font-weight:800;letter-spacing:.05em;
  box-shadow:0 12px 28px rgba(124,92,255,.4);transition:transform .08s;
}
.play-btn:active{transform:translateY(2px);}
.play-hint{margin-top:10px;font-size:12px;color:var(--muted);}
#high-line{margin-top:14px;font-size:13px;color:var(--draw);font-weight:700;letter-spacing:.04em;}

/* language toggle */
.lang-row{display:flex;justify-content:center;gap:8px;margin-top:18px;}
.lang-btn{
  padding:7px 16px;border-radius:999px;cursor:pointer;
  background:transparent;border:1px solid var(--line);color:var(--muted);
  font-family:inherit;font-weight:800;font-size:13px;transition:.15s;
}
.lang-btn.active{background:var(--accent);border-color:var(--accent-2);color:#fff;}

/* RTL */
#overlay.rtl .panel{direction:rtl;}
#overlay.rtl .instructions{text-align:center;}

/* ── Responsive ──────────────────────────────────── */
@media (max-width:520px){
  #hud{padding:10px 12px;}
  .score-num{font-size:26px;}
  #mode-badge{font-size:11px;padding:3px 9px;}
  .move-btn{min-height:74px;border-radius:18px;}
  .move-btn .mv-key{display:none;}
  .vs{margin:0 2px;}
}
@media (max-height:560px){
  #arena{gap:10px;}
  #banner{min-height:34px;}
}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="score-cell you">
    <span class="score-label" id="you-label">YOU</span>
    <span class="score-num" id="you-score">0</span>
  </div>
  <div id="center-badge">
    <span id="mode-badge">—</span>
    <span id="best-chip">★ 0</span>
  </div>
  <div class="score-cell cpu">
    <span class="score-label" id="cpu-label">CPU</span>
    <span class="score-num" id="cpu-score">0</span>
  </div>
</div>

<!-- ARENA -->
<div id="arena">
  <div id="duel">
    <div class="fighter you">
      <span class="fighter-name" id="duel-you">YOU</span>
      <div class="glyph-card" id="you-card">❔</div>
    </div>
    <span class="vs">VS</span>
    <div class="fighter cpu">
      <span class="fighter-name" id="duel-cpu">CPU</span>
      <div class="glyph-card" id="cpu-card">❔</div>
    </div>
  </div>
  <div id="banner"></div>
</div>

<!-- GAME BUTTONS (Pause / Reset) -->
<div id="game-btns" class="hidden">
  <button class="game-btn" id="btn-pause"><span class="gb-icon">⏸</span><span class="gb-label">Pause</span><span class="gb-key">Esc</span></button>
  <button class="game-btn" id="btn-reset"><span class="gb-icon">↺</span><span class="gb-label">Reset</span></button>
</div>

<!-- PAUSE OVERLAY -->
<div id="pause-overlay" class="hidden">
  <div class="pause-panel">
    <div id="pause-title">⏸ PAUSED</div>
    <button class="pause-action-btn" id="resume-btn">▶ Resume</button>
    <button class="pause-action-btn" id="reset-from-pause-btn">↺ Reset</button>
  </div>
</div>

<!-- MOVE BUTTONS -->
<div id="controls">
  <button class="move-btn" data-move="rock"><span class="mv-glyph">✊</span><span class="mv-name">Rock</span><span class="mv-key">R</span></button>
  <button class="move-btn" data-move="paper"><span class="mv-glyph">✋</span><span class="mv-name">Paper</span><span class="mv-key">P</span></button>
  <button class="move-btn" data-move="scissors"><span class="mv-glyph">✌️</span><span class="mv-name">Scissors</span><span class="mv-key">S</span></button>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="panel">
    <h1 class="title" id="ov-title">PRS</h1>
    <p class="sub" id="ov-sub">Rock · Paper · Scissors</p>

    <!-- start content -->
    <div id="start-content">
      <p class="instructions" id="ov-instructions"></p>
      <div class="field-label" id="ov-mode-label">MATCH</div>
      <div class="seg" id="mode-seg">
        <button class="seg-btn" data-bestof="3">Best of 3</button>
        <button class="seg-btn active" data-bestof="5">Best of 5</button>
        <button class="seg-btn" data-bestof="7">Best of 7</button>
        <button class="seg-btn" data-bestof="0" id="seg-endless">Endless</button>
      </div>
    </div>

    <!-- game over content -->
    <div id="go-content" style="display:none;">
      <div class="go-stats">
        <div class="go-stat you"><span class="v" id="go-you">0</span><span class="l" id="go-you-l">YOU</span></div>
        <div class="go-stat cpu"><span class="v" id="go-cpu">0</span><span class="l" id="go-cpu-l">CPU</span></div>
      </div>
    </div>

    <button class="play-btn" id="play-btn">Play</button>
    <div class="play-hint" id="play-hint">Press Enter to start</div>
    <div id="high-line"></div>

    <div class="lang-row">
      <button class="lang-btn active" data-lang="en">English</button>
      <button class="lang-btn" data-lang="ar">العربية</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  GAME RULES (data-driven — extensible to Lizard-Spock)
// ═══════════════════════════════════════════════════
const MOVES = ['rock','paper','scissors'];
const BEATS = { rock:['scissors'], paper:['rock'], scissors:['paper'] };
const GLYPH = { rock:'✊', paper:'✋', scissors:'✌️' };
const beats = (a,b) => BEATS[a].includes(b);
// Lizard-Spock later: add 'lizard','spock' to MOVES, extend each BEATS entry, add glyphs/buttons. No other change.

const cpuPick = () => MOVES[Math.floor(Math.random() * MOVES.length)];

// ═══════════════════════════════════════════════════
//  UI STRINGS  (English / Arabic)
// ═══════════════════════════════════════════════════
const STRINGS = {
  en: {
    title:'PRS',
    sub:'Rock · Paper · Scissors',
    instructions:`Throw your move and beat the computer.<br>
      <span>Rock</span> crushes Scissors · <span>Paper</span> covers Rock · <span>Scissors</span> cut Paper.<br>
      Pick a match length, or go <span>Endless</span> for a streak.`,
    matchLabel:'MATCH',
    bestOf:n=>`Best of ${n}`,
    endless:'Endless',
    play:'Play',
    playAgain:'Play Again',
    playHint:'Press Enter to start',
    you:'YOU', cpu:'CPU',
    win:'You win!', lose:'CPU wins!', draw:'Draw',
    matchWin:'🏆 You won the match!',
    matchLose:'💀 CPU won the match.',
    best:n=>`★ Best streak: ${n}`,
    rock:'Rock', paper:'Paper', scissors:'Scissors',
    streak:'STREAK',
    pause:'Pause', resume:'Resume', reset:'Reset', pausedTitle:'⏸ PAUSED',
  },
  ar:{
    title:'حجر ورقة مقص',
    sub:'حجر · ورقة · مقص',
    instructions:`اختر حركتك واهزم الكمبيوتر.<br>
      <span>الحجر</span> يكسر المقص · <span>الورقة</span> تغطي الحجر · <span>المقص</span> يقص الورقة.<br>
      اختر طول المباراة، أو العب <span>بلا نهاية</span> لتسجيل سلسلة انتصارات.`,
    matchLabel:'المباراة',
    bestOf:n=>`أفضل من ${n}`,
    endless:'بلا نهاية',
    play:'العب',
    playAgain:'العب مرة أخرى',
    playHint:'اضغط Enter للبدء',
    you:'أنت', cpu:'الكمبيوتر',
    win:'فزت!', lose:'فاز الكمبيوتر!', draw:'تعادل',
    matchWin:'🏆 لقد فزت بالمباراة!',
    matchLose:'💀 فاز الكمبيوتر بالمباراة.',
    best:n=>`★ أفضل سلسلة: ${n}`,
    rock:'حجر', paper:'ورقة', scissors:'مقص',
    streak:'السلسلة',
    pause:'إيقاف', resume:'استمر', reset:'إعادة', pausedTitle:'⏸ متوقف',
  },
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const HS_KEY = 'prs_best';
let state = {
  language:'en',
  running:false,
  paused:false,
  locked:false,
  mode:'bestof',      // 'bestof' | 'endless'
  bestOf:5,
  youScore:0,
  cpuScore:0,
  round:0,
  streak:0,
  bestStreak:0,
  audioCtx:null,
};
let overlayMode = 'start';   // 'start' | 'gameover'
let lastResult = 'draw';     // for game-over coloring

// ═══════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const overlay = $('overlay');
const youScoreEl = $('you-score'), cpuScoreEl = $('cpu-score');
const modeBadge = $('mode-badge'), bestChip = $('best-chip');
const youCard = $('you-card'), cpuCard = $('cpu-card');
const banner = $('banner');
const controls = $('controls');
const gameBtns = $('game-btns');
const pauseOverlay = $('pause-overlay');
const moveBtns = [...document.querySelectorAll('.move-btn')];

// ═══════════════════════════════════════════════════
//  AUDIO (procedural — Web Audio API)
// ═══════════════════════════════════════════════════
function initAudio(){
  if (state.audioCtx) return;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, type='sine', dur=0.06, vol=0.12, delay=0){
  if (!state.audioCtx) return;
  const ctx = state.audioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + dur + 0.01);
}
const sndTick   = () => playTone(330 + Math.random()*60, 'triangle', 0.05, 0.07);
const sndWin    = () => { playTone(523,'sine',0.09,0.14,0); playTone(659,'sine',0.09,0.14,0.07); playTone(784,'sine',0.11,0.14,0.14); };
const sndLose   = () => playTone(150,'sawtooth',0.22,0.15);
const sndDraw   = () => playTone(300,'square',0.10,0.08);
const sndMatchWin  = () => [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.13,0.16,i*0.1));
const sndMatchLose = () => [392,330,262,196].forEach((f,i)=>playTone(f,'sawtooth',0.16,0.13,i*0.11));

// ═══════════════════════════════════════════════════
//  i18n
// ═══════════════════════════════════════════════════
function applyOverlayStrings(){
  const S = STRINGS[state.language];
  $('ov-title').textContent = S.title;
  $('ov-sub').textContent = S.sub;
  $('play-hint').textContent = S.playHint;
  $('high-line').textContent = S.best(state.bestStreak);
  overlay.classList.toggle('rtl', state.language === 'ar');

  if (overlayMode === 'start'){
    $('start-content').style.display = '';
    $('go-content').style.display = 'none';
    $('ov-instructions').innerHTML = S.instructions;
    $('ov-mode-label').textContent = S.matchLabel;
    // mode segment labels
    document.querySelectorAll('#mode-seg .seg-btn').forEach(b=>{
      const n = +b.dataset.bestof;
      b.textContent = n === 0 ? S.endless : S.bestOf(n);
    });
    $('play-btn').textContent = S.play;
  } else {
    $('start-content').style.display = 'none';
    $('go-content').style.display = '';
    $('ov-title').textContent = lastResult === 'win' ? S.matchWin
                              : lastResult === 'lose' ? S.matchLose : S.title;
    $('go-you').textContent = state.youScore;
    $('go-cpu').textContent = state.cpuScore;
    $('go-you-l').textContent = S.you;
    $('go-cpu-l').textContent = S.cpu;
    $('play-btn').textContent = S.playAgain;
  }
  // shared HUD/labels
  $('you-label').textContent = S.you;
  $('cpu-label').textContent = S.cpu;
  $('duel-you').textContent = S.you;
  $('duel-cpu').textContent = S.cpu;
  moveBtns.forEach(b=>{ b.querySelector('.mv-name').textContent = S[b.dataset.move]; });
}
function updateLangButton(){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang === state.language));
  document.documentElement.lang = state.language;
  applyOverlayStrings();
  syncGameBtns();
}

// ═══════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════
function updateHUD(){
  const S = STRINGS[state.language];
  youScoreEl.textContent = state.youScore;
  cpuScoreEl.textContent = state.cpuScore;
  if (state.mode === 'endless'){
    modeBadge.textContent = `${S.streak} ${state.streak}`;
  } else {
    const target = Math.ceil(state.bestOf / 2);
    modeBadge.textContent = `${S.bestOf(state.bestOf)} · ${target}↑`;
  }
  bestChip.textContent = `★ ${state.bestStreak}`;
}

// ═══════════════════════════════════════════════════
//  LIFECYCLE
// ═══════════════════════════════════════════════════
function syncGameBtns(){
  const S = STRINGS[state.language];
  const pauseBtn = $('btn-pause');
  pauseBtn.querySelector('.gb-label').textContent = state.paused ? S.resume : S.pause;
  pauseBtn.querySelector('.gb-icon').textContent  = state.paused ? '▶' : '⏸';
  pauseBtn.querySelector('.gb-key').textContent   = 'Esc';
  $('btn-reset').querySelector('.gb-label').textContent = S.reset;
  $('pause-title').textContent  = S.pausedTitle;
  $('resume-btn').textContent   = `▶ ${S.resume}`;
  $('reset-from-pause-btn').textContent = `↺ ${S.reset}`;
}

function startGame(){
  initAudio();
  state.running = true;
  state.paused  = false;
  state.locked  = false;
  state.youScore = 0; state.cpuScore = 0;
  state.round = 0; state.streak = 0;
  overlay.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  gameBtns.classList.remove('hidden');
  controls.classList.remove('disabled');
  resetCards();
  banner.className = ''; banner.textContent = '';
  syncGameBtns();
  updateHUD();
}

function pauseGame(){
  if (!state.running || state.locked) return;
  state.paused = true;
  controls.classList.add('disabled');
  syncGameBtns();
  pauseOverlay.classList.remove('hidden');
}

function resumeGame(){
  state.paused = false;
  pauseOverlay.classList.add('hidden');
  controls.classList.remove('disabled');
  syncGameBtns();
}

function resetCards(){
  youCard.textContent = '❔'; cpuCard.textContent = '❔';
  youCard.className = 'glyph-card'; cpuCard.className = 'glyph-card';
}

function playRound(move){
  if (!state.running || state.locked) return;
  state.locked = true;
  controls.classList.add('disabled');

  const cpu = cpuPick();
  // flash the chosen button
  const btn = moveBtns.find(b=>b.dataset.move===move);
  if (btn){ btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'), 300); }

  // "Rock, Paper, Scissors, Shoot!" — both fists shake, then reveal
  youCard.textContent = '✊'; cpuCard.textContent = '✊';
  youCard.className = 'glyph-card shake'; cpuCard.className = 'glyph-card shake';
  let ticks = 0;
  const shakeTimer = setInterval(()=>{ sndTick(); if (++ticks >= 3) clearInterval(shakeTimer); }, 230);

  setTimeout(()=>{
    clearInterval(shakeTimer);
    youCard.textContent = GLYPH[move]; cpuCard.textContent = GLYPH[cpu];
    youCard.className = 'glyph-card pop'; cpuCard.className = 'glyph-card pop';

    let result;
    if (move === cpu) result = 'draw';
    else if (beats(move, cpu)) result = 'win';
    else result = 'lose';

    resolveRound(result);
  }, 760);
}

function resolveRound(result){
  const S = STRINGS[state.language];
  state.round++;

  if (result === 'win'){
    state.youScore++;
    if (state.mode === 'endless'){
      state.streak++;
      if (state.streak > state.bestStreak){ state.bestStreak = state.streak; saveBest(); }
    }
    youCard.classList.add('win'); cpuCard.classList.add('lose');
    banner.textContent = S.win; banner.className = 'win show'; sndWin();
  } else if (result === 'lose'){
    state.cpuScore++;
    if (state.mode === 'endless') state.streak = 0;
    cpuCard.classList.add('win'); youCard.classList.add('lose');
    banner.textContent = S.lose; banner.className = 'lose show'; sndLose();
  } else {
    banner.textContent = S.draw; banner.className = 'draw show'; sndDraw();
  }
  updateHUD();

  // match end check (best-of only)
  if (state.mode === 'bestof'){
    const target = Math.ceil(state.bestOf / 2);
    if (state.youScore >= target || state.cpuScore >= target){
      setTimeout(()=>endMatch(state.youScore > state.cpuScore ? 'win' : 'lose'), 900);
      return;
    }
  }
  // otherwise continue
  setTimeout(()=>{
    if (!state.running) return;
    state.locked = false;
    if (!state.paused) controls.classList.remove('disabled');
    banner.classList.remove('show');
  }, 700);
}

function endMatch(result){
  state.running = false;
  state.paused  = false;
  state.locked  = false;
  lastResult = result;
  overlayMode = 'gameover';
  controls.classList.add('disabled');
  gameBtns.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  if (result === 'win') sndMatchWin(); else sndMatchLose();
  applyOverlayStrings();
  updateHUD();
  overlay.classList.remove('hidden');
}

function resetGame(){
  state.running = false;
  state.paused  = false;
  state.locked  = false;
  overlayMode = 'start';
  controls.classList.add('disabled');
  gameBtns.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  resetCards();
  banner.className = ''; banner.textContent = '';
  applyOverlayStrings();
  updateHUD();
  overlay.classList.remove('hidden');
}

// ═══════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════
function loadBest(){ const v = parseInt(localStorage.getItem(HS_KEY),10); state.bestStreak = Number.isFinite(v) ? v : 0; }
function saveBest(){ try{ localStorage.setItem(HS_KEY, String(state.bestStreak)); }catch(e){} }

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
moveBtns.forEach(b => b.addEventListener('click', () => { initAudio(); playRound(b.dataset.move); }));

// mode selector
document.querySelectorAll('#mode-seg .seg-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#mode-seg .seg-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const n = +b.dataset.bestof;
    if (n === 0){ state.mode = 'endless'; }
    else { state.mode = 'bestof'; state.bestOf = n; }
    updateHUD();
  });
});

// language toggle
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click', ()=>{ state.language = b.dataset.lang; updateLangButton(); updateHUD(); });
});

// play button
$('play-btn').addEventListener('click', startGame);

// pause / reset in-game buttons
$('btn-pause').addEventListener('click', ()=>{ state.paused ? resumeGame() : pauseGame(); });
$('btn-reset').addEventListener('click', resetGame);
$('resume-btn').addEventListener('click', resumeGame);
$('reset-from-pause-btn').addEventListener('click', resetGame);

// keyboard
const KEYMAP = { r:'rock', p:'paper', s:'scissors', '1':'rock', '2':'paper', '3':'scissors' };
document.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  if (!state.running){
    if (e.key === 'Enter'){ e.preventDefault(); startGame(); }
    return;
  }
  if (state.paused){
    if (e.key === 'Escape' || e.key === 'Enter' || e.key === ' '){ e.preventDefault(); resumeGame(); }
    return;
  }
  if (e.key === 'Escape'){ e.preventDefault(); pauseGame(); return; }
  if (KEYMAP[k]){ e.preventDefault(); initAudio(); playRound(KEYMAP[k]); }
});

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
loadBest();
updateLangButton();
updateHUD();
</script>
</body>
</html>
